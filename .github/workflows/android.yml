name: Build Android Release APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Собираем ТОЛЬКО Release версию. 
      # Это автоматически создаст app-release-unsigned.apk (если не настроено автоматическое подписание)
      - name: Build Unsigned Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: List APK files
        run: ls -la app/build/outputs/apk/release/

      - name: Upload Unsigned Release APK
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7

      # ⚠️ ПРИМЕЧАНИЕ: 
      # Если вы хотите, чтобы этот релиз собирался ТОЛЬКО при пуше в main (игнорируя PR и ручной запуск),
      # добавьте строку `if: github.event_name == 'push' && github.ref == 'refs/heads/main'` 
      # к шагам "Build Unsigned Release APK", "List APK files" и "Upload Unsigned Release APK".
      # Но рекомендуется оставлять как есть, чтобы проверять сборку релиза еще на этапе PR.
